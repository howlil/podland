version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: podland-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: podland
      POSTGRES_USER: podland
      POSTGRES_PASSWORD: podland_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podland"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: podland-backend
    restart: unless-stopped
    environment:
      ENV: development
      PORT: 8080
      FRONTEND_URL: http://localhost:3000
      GITHUB_CALLBACK_URL: http://localhost:8080/api/auth/github/callback
      DATABASE_URL: postgresql://podland:podland_password_change_me@postgres:5432/podland?sslmode=disable
      JWT_SECRET: change-this-to-a-secure-random-string-min-32-chars
      REFRESH_TOKEN_SECRET: change-this-to-another-secure-random-string-min-32-chars
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - avatar_storage:/app/uploads/avatars
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  avatar_storage:
