# Podland Backend Deployment for k3s
# Note: Secrets are now managed via SealedSecret
# See: secrets/backend-sealedsecret.yaml and secrets/postgres-sealedsecret.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: podland-backend
  namespace: podland
spec:
  replicas: 1
  selector:
    matchLabels:
      app: podland-backend
  template:
    metadata:
      labels:
        app: podland-backend
    spec:
      containers:
        - name: backend
          image: podland/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: FRONTEND_URL
              value: "http://localhost:3000"
            - name: GITHUB_CALLBACK_URL
              value: "http://localhost:8080/api/auth/github/callback"
            - name: DATABASE_URL
              value: "postgresql://podland:$(POSTGRES_PASSWORD)@postgres:5432/podland?sslmode=disable"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: podland-backend-secret
                  key: jwt-secret
            - name: REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: podland-backend-secret
                  key: refresh-token-secret
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: podland-backend-secret
                  key: github-client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: podland-backend-secret
                  key: github-client-secret
            - name: ALLOWED_ORIGINS
              value: "http://localhost:3000,http://localhost:5173"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: avatar-storage
              mountPath: /app/uploads/avatars
      volumes:
        - name: avatar-storage
          persistentVolumeClaim:
            claimName: avatar-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: podland-backend
  namespace: podland
spec:
  selector:
    app: podland-backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: avatar-pvc
  namespace: podland
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
