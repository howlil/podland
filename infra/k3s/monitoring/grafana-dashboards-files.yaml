  vm-logs.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 100,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "normal"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "legend": {"calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "sum by (level) (count_over_time({vm_id=\"$vm_id\"} [$__range]))",
              "legendFormat": "{{level}}",
              "refId": "A"
            }
          ],
          "title": "Log Volume Over Time",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"h": 14, "w": 24, "x": 0, "y": 6},
          "id": 2,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": true,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "{vm_id=\"$vm_id\"}",
              "refId": "A"
            }
          ],
          "title": "Recent Logs",
          "type": "table"
        },
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"h": 14, "w": 24, "x": 0, "y": 20},
          "id": 3,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": true,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "{vm_id=\"$vm_id\"} |= \"error\" or |= \"Error\" or |= \"ERROR\"",
              "refId": "A"
            }
          ],
          "title": "Error Logs",
          "type": "table"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["vm", "logs", "podland"],
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": {"type": "loki", "uid": "loki"},
            "definition": "label_values({vm_id!=\"\"}, vm_id)",
            "hide": 0,
            "includeAll": false,
            "label": "VM ID",
            "multi": false,
            "name": "vm_id",
            "options": [],
            "query": {"query": "label_values({vm_id!=\"\"}, vm_id)", "refId": "StandardVariableQuery"},
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 0,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-24h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "VM Logs",
      "uid": "vm-logs",
      "version": 1,
      "weekStart": ""
    }
