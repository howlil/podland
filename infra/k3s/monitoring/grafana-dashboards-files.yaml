        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["vm", "podland"],
      "templating": {
        "list": [
          {
            "current": {},
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "definition": "label_values(container_cpu_usage_seconds_total, vm_id)",
            "hide": 0,
            "includeAll": false,
            "label": "VM ID",
            "multi": false,
            "name": "vm_id",
            "options": [],
            "query": {"query": "label_values(container_cpu_usage_seconds_total, vm_id)", "refId": "StandardVariableQuery"},
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 0,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-24h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "VM Metrics",
      "uid": "vm-metrics",
      "version": 1,
      "weekStart": ""
