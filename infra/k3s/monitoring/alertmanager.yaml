# Alertmanager Instance CR
apiVersion: monitoring.coreos.com/v1
kind: Alertmanager
metadata:
  name: podland
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  version: v0.27.0
  serviceAccountName: alertmanager
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  securityContext:
    fsGroup: 65534
    runAsNonRoot: true
    runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 9093
    targetPort: 9093
  selector:
    app: alertmanager
