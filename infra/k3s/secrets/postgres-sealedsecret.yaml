# SealedSecret for PostgreSQL credentials
# Generate with: kubeseal --format yaml < secret.yaml > postgres-sealedsecret.yaml
# DO NOT commit the unencrypted secret.yaml to git

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-secret
  namespace: podland
spec:
  encryptedData:
    # Replace these encrypted values with your own generated via kubeseal
    # Example: echo -n 'your-secure-password' | kubeseal --raw --from-file=/dev/stdin --namespace podland --name postgres-secret --key password
    password: AgBy8sF3......
  template:
    metadata:
      name: postgres-secret
      namespace: podland
    type: Opaque
