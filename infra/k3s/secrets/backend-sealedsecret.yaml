# SealedSecret for Backend credentials
# Generate with: kubeseal --format yaml < secret.yaml > backend-sealedsecret.yaml
# DO NOT commit the unencrypted secret.yaml to git

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: podland-backend-secret
  namespace: podland
spec:
  encryptedData:
    # Replace these encrypted values with your own generated via kubeseal
    # Example: echo -n 'your-jwt-secret-min-32-chars' | kubeseal --raw --from-file=/dev/stdin --namespace podland --name podland-backend-secret --key jwt-secret
    jwt-secret: AgBy8sF3...REPLACE_WITH_GENERATED_VALUE...
    refresh-token-secret: AgBy8sF3...REPLACE_WITH_GENERATED_VALUE...
    github-client-id: AgBy8sF3...REPLACE_WITH_GENERATED_VALUE...
    github-client-secret: AgBy8sF3...REPLACE_WITH_GENERATED_VALUE...
  template:
    metadata:
      name: podland-backend-secret
      namespace: podland
    type: Opaque
