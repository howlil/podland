# Cloudflare Origin CA Certificate Setup
# ======================================
#
# IMPORTANT: This certificate must be generated manually via the Cloudflare Dashboard.
# Follow these steps:
#
# 1. Go to Cloudflare Dashboard → SSL/TLS → Origin Server
# 2. Click "Create Certificate"
# 3. Select:
#    - Hostnames: *.podland.app, podland.app
#    - Key type: RSA (2048)
#    - Certificate Authority: Cloudflare Origin
#    - Valid for: 15 years (maximum)
# 4. Click "Create"
# 5. Download the certificate and private key
#
# 6. Create Kubernetes secret:
#    kubectl create secret tls origin-ca-cert \
#      --cert=path/to/cert.pem \
#      --key=path/to/key.pem \
#      -n podland
#
# 7. Verify secret:
#    kubectl get secret origin-ca-cert -n podland -o yaml
#
# Alternative: Apply this YAML after replacing the certificate placeholders
# (Note: For security, prefer kubectl create secret over committing certs to git)

apiVersion: v1
kind: Secret
metadata:
  name: origin-ca-cert
  namespace: podland
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    # REPLACE WITH YOUR ORIGIN CA CERTIFICATE
    # Generated from Cloudflare Dashboard → SSL/TLS → Origin Server
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    # REPLACE WITH YOUR PRIVATE KEY
    # Keep this secret - do not commit to version control
    -----END PRIVATE KEY-----

---
# TLSStore for Traefik to use as default certificate
apiVersion: traefik.containo.us/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: podland
  labels:
    app: podland
spec:
  defaultCertificate:
    secretName: origin-ca-cert
