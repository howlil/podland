# Build VM Images
# Builds and pushes Ubuntu 22.04 and Debian 12 VM images to Docker Hub
# Schedule: Monthly on the 1st of every month at 00:00 UTC
# Manual trigger: Enabled via workflow_dispatch

name: Build VM Images

on:
  # Monthly schedule: 1st of every month at 00:00 UTC
  schedule:
    - cron: '0 0 1 * *'
  
  # Manual trigger for on-demand builds
  workflow_dispatch:
    inputs:
      os:
        description: 'OS to build (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - ubuntu-2204
          - debian-12
      push:
        description: 'Push to Docker Hub'
        required: false
        default: true
        type: boolean

env:
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  BUILD_CONTEXT_ROOT: ./vm-images

jobs:
  # Build matrix configuration
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.os }}" ]; then
            # Single OS selected
            echo "matrix={\"os\": [\"${{ github.event.inputs.os }}\"]}" >> $GITHUB_OUTPUT
          else
            # Build all OS
            echo 'matrix={"os": ["ubuntu-2204", "debian-12"]}' >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: build-matrix
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.build-matrix.outputs.matrix).os }}
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
      
      - name: Login to Docker Hub
        if: ${{ github.event.inputs.push != 'false' && github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/podland-${{ matrix.os }}
          tags: |
            # Latest tag for scheduled builds
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' }}
            # Version tag from run number (e.g., v123)
            type=raw,value=v${{ github.run_number }}
            # Monthly tag (e.g., 2026-03)
            type=raw,value=${{ github.run_started_at.strftime('%Y-%m') }}
            # Full date tag for scheduled builds (e.g., 2026-03-27)
            type=raw,value=${{ github.run_started_at.strftime('%Y-%m-%d') }},enable=${{ github.event_name == 'schedule' }}
            # Branch tag for non-main branches
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' }}
            # PR tag for pull requests
            type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}
      
      - name: Build and push ${{ matrix.os }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT_ROOT }}/${{ matrix.os }}
          file: ${{ env.BUILD_CONTEXT_ROOT }}/${{ matrix.os }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.push != 'false' && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
      
      - name: Generate build summary
        if: always()
        run: |
          echo "## Build Summary: ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| OS | ${{ matrix.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Date | ${{ github.run_started_at }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | $(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.os }}-${{ github.run_id }}
          path: /tmp/buildkit-logs/
          retention-days: 7
  
  # Post-build notification
  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'failure')
    steps:
      - name: Generate notification payload
        id: payload
        run: |
          STATUS="${{ needs.build.result }}"
          if [ "$STATUS" == "success" ]; then
            EMOJI="✅"
          elif [ "$STATUS" == "failure" ]; then
            EMOJI="❌"
          else
            EMOJI="⚠️"
          fi
          
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT
          echo "workflow_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
      
      - name: Build notification summary
        run: |
          echo "## ${{ steps.payload.outputs.emoji }} VM Image Build ${{ steps.payload.outputs.status }}"
          echo ""
          echo "- **Workflow:** Build VM Images"
          echo "- **Status:** ${{ steps.payload.outputs.status }}"
          echo "- **Run:** [#${{ github.run_number }}](${{ steps.payload.outputs.workflow_url }})"
          echo "- **Trigger:** ${{ github.event_name }}"
          echo "- **Images:** ubuntu-2204, debian-12"
          echo "- **Registry:** docker.io/${{ secrets.DOCKERHUB_USERNAME }}"
          echo ""
          echo "### Tags"
          echo "- \`latest\` - Latest stable build"
          echo "- \`v${{ github.run_number }}\` - Version tag"
          echo "- \`${{ github.run_started_at.strftime('%Y-%m') }}\` - Monthly tag"
